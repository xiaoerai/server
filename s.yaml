edition: 3.0.0
name: xiaoer-server
access: default

resources:
  server:
    component: fc3
    props:
      region: cn-shanghai
      functionName: xiaoer-server
      runtime: custom.debian10
      handler: index.handler
      timeout: 30
      memorySize: 512
      layers:
        - acs:fc:cn-shanghai:official:layers/Nodejs18/versions/1
      environmentVariables:
        NODE_ENV: production
        PORT: '9000'
        TCB_ENV_ID: ${env('TCB_ENV_ID')}
        TCB_SECRET_ID: ${env('TCB_SECRET_ID')}
        TCB_SECRET_KEY: ${env('TCB_SECRET_KEY')}
        ALIPAY_APP_ID: ${env('ALIPAY_APP_ID')}
        ALIPAY_PRIVATE_KEY: ${env('ALIPAY_PRIVATE_KEY')}
        ALIPAY_PUBLIC_KEY: ${env('ALIPAY_PUBLIC_KEY')}
        ALIPAY_NOTIFY_URL: ${env('ALIPAY_NOTIFY_URL')}
        HOSTEX_SESSION: ${env('HOSTEX_SESSION')}
        HOSTEX_OPERATOR_ID: ${env('HOSTEX_OPERATOR_ID')}
        JWT_SECRET: ${env('JWT_SECRET')}
        JWT_EXPIRES_IN: 7d
      code: ./
      customRuntimeConfig:
        command:
          - /var/fc/lang/nodejs18/bin/node
          - dist/index.js
        port: 9000
      triggers:
        - triggerName: http
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
