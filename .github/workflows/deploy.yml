name: Deploy to Alibaba Cloud FC

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
      TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
      TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
      ALIPAY_APP_ID: ${{ secrets.ALIPAY_APP_ID }}
      ALIPAY_PRIVATE_KEY: ${{ secrets.ALIPAY_PRIVATE_KEY }}
      ALIPAY_PUBLIC_KEY: ${{ secrets.ALIPAY_PUBLIC_KEY }}
      ALIPAY_NOTIFY_URL: ${{ secrets.ALIPAY_NOTIFY_URL }}
      HOSTEX_SESSION: ${{ secrets.HOSTEX_SESSION }}
      HOSTEX_OPERATOR_ID: ${{ secrets.HOSTEX_OPERATOR_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prune dev dependencies
        run: pnpm prune --prod

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: s config add --AccessKeyID ${{ secrets.ALIYUN_ACCESS_KEY_ID }} --AccessKeySecret ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }} -a default --force

      - name: Deploy
        run: s deploy --yes
